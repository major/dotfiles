# Host-specific and custom alacritty overrides
# Ported from kitty local.conf

[terminal]
shell = "/usr/bin/zsh"

[font]
size = 9.0

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

# Numpad Enter sends literal newline (LF) instead of CR
[[keyboard.bindings]]
key = "NumpadEnter"
chars = "\u000A"

# Tokyo Night color theme
# https://github.com/folke/tokyonight.nvim
[colors.primary]
background = '#1a1b26'
foreground = '#c0caf5'

[colors.selection]
background = '#283457'
foreground = '#c0caf5'

[colors.cursor]
cursor = '#c0caf5'
text = '#1a1b26'

[colors.normal]
black   = '#15161e'
red     = '#f7768e'
green   = '#9ece6a'
yellow  = '#e0af68'
blue    = '#7aa2f7'
magenta = '#bb9af7'
cyan    = '#7dcfff'
white   = '#a9b1d6'

[colors.bright]
black   = '#414868'
red     = '#ff899d'
green   = '#9fe044'
yellow  = '#faba4a'
blue    = '#8db0ff'
magenta = '#c7a9ff'
cyan    = '#a4daff'
white   = '#c0caf5'

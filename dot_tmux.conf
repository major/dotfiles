set -s extended-keys on
set -s extended-keys-format csi-u

# True color support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-256color:RGB"

# Enable focus events (used by nvim autocommands)
set -g focus-events on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'erikw/tmux-powerline'

# Kill window without confirmation prompt
bind-key & kill-window

# tmux-sessionizer: fzf project picker
bind-key -r f run-shell "tmux neww tmux-sessionizer"

# Open opencode in a left split
bind-key o split-window -hb 'opencode' \; select-pane -t 1

# Enable mouse support
set -g mouse on

# Enable OSC 52 clipboard for copying over SSH
set -g set-clipboard on

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
